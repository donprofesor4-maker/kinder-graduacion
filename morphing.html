<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Morphing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  h1 {
    font-size: 2rem;
    background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .subtitle {
    color: #888;
    margin-bottom: 30px;
    font-size: 1rem;
  }
  .canvas {
    width: 300px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  .shape {
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
    transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 60px rgba(99, 102, 241, 0.3),
                0 0 120px rgba(168, 85, 247, 0.15);
  }
  .shape.circle { border-radius: 50%; transform: scale(1); }
  .shape.hexagon { border-radius: 25%; transform: scale(1.05); }
  .shape.triangle { border-radius: 10%; transform: scale(1.1); }
  .shape.star { border-radius: 5%; transform: scale(1.05); }
  .shape.diamond { border-radius: 3%; transform: scale(1.15) rotate(45deg); }
  .shape.square { border-radius: 2%; transform: scale(1.05); }
  .shape.pill { border-radius: 50%; transform: scale(1.1) rotate(90deg); }
  .shape.cross { border-radius: 3%; transform: scale(1.1) rotate(45deg); }

  .selection-area {
    margin-top: 20px;
    text-align: center;
  }
  .selection-label {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 15px;
  }
  .shape-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .shape-btn {
    width: 60px;
    height: 60px;
    border: 2px solid #333;
    background: transparent;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    position: relative;
  }
  .shape-btn .preview {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
    transition: all 0.3s;
  }
  .shape-btn.selected {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.1);
  }
  .shape-btn.selected .preview {
    box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
  }
  .shape-btn .preview.circle { border-radius: 50%; }
  .shape-btn .preview.hexagon { border-radius: 25%; }
  .shape-btn .preview.triangle { border-radius: 10%; }
  .shape-btn .preview.star { border-radius: 5%; }
  .shape-btn .preview.diamond { border-radius: 3%; }
  .shape-btn .preview.square { border-radius: 2%; }
  .shape-btn .preview.pill { border-radius: 50%; }
  .shape-btn .preview.cross { border-radius: 3%; }

  .count-selector {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 15px;
  }
  .count-btn {
    padding: 8px 16px;
    border: 1px solid #333;
    background: transparent;
    color: #ccc;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .count-btn:hover { border-color: #6366f1; }
  .count-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }

  .status {
    margin-top: 15px;
    font-size: 0.9rem;
    color: #a78bfa;
    min-height: 24px;
  }
  .bg-glow {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
    pointer-events: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>

  <h1>Shape Morphing</h1>
  <p class="subtitle">Selecciona 2, 3 o 4 formas y observa la magia</p>

  <div class="canvas">
    <div class="shape circle" id="shape"></div>
  </div>

  <div class="status" id="status">Selecciona al menos 2 formas</div>

  <div class="selection-area">
    <div class="selection-label">¿Cuántas formas?</div>
    <div class="count-selector">
      <button class="count-btn" onclick="setCount(2)">2</button>
      <button class="count-btn active" onclick="setCount(3)">3</button>
      <button class="count-btn" onclick="setCount(4)">4</button>
    </div>

    <div class="selection-label">Elige las formas</div>
    <div class="shape-buttons" id="shapeButtons">
      <button class="shape-btn selected" onclick="toggleShape('circle', this)">
        <div class="preview circle"></div>
      </button>
      <button class="shape-btn selected" onclick="toggleShape('hexagon', this)">
        <div class="preview hexagon"></div>
      </button>
      <button class="shape-btn selected" onclick="toggleShape('triangle', this)">
        <div class="preview triangle"></div>
      </button>
      <button class="shape-btn" onclick="toggleShape('star', this)">
        <div class="preview star"></div>
      </button>
      <button class="shape-btn" onclick="toggleShape('diamond', this)">
        <div class="preview diamond"></div>
      </button>
      <button class="shape-btn" onclick="toggleShape('square', this)">
        <div class="preview square"></div>
      </button>
      <button class="shape-btn" onclick="toggleShape('pill', this)">
        <div class="preview pill"></div>
      </button>
      <button class="shape-btn" onclick="toggleShape('cross', this)">
        <div class="preview cross"></div>
      </button>
    </div>
  </div>

<script>
const shapeNames = ['circle', 'hexagon', 'triangle', 'star', 'diamond', 'square', 'pill', 'cross'];
const shapeLabels = ['Círculo', 'Hexágono', 'Triángulo', 'Estrella', 'Diamante', 'Cuadrado', 'Píldora', 'Cruz'];

let selectedShapes = ['circle', 'hexagon', 'triangle'];
let targetCount = 3;
let currentIndex = 0;
let autoInterval = null;
let isPlaying = false;

const shapeEl = document.getElementById('shape');
const statusEl = document.getElementById('status');

function setCount(count) {
  targetCount = count;
  document.querySelectorAll('.count-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i + 2 === count);
  });
  
  let currentSelected = [];
  document.querySelectorAll('.shape-btn.selected').forEach(btn => {
    const idx = Array.from(btn.parentElement.children).indexOf(btn);
    currentSelected.push(shapeNames[idx]);
  });
  
  if (currentSelected.length > count) {
    selectedShapes = currentSelected.slice(0, count);
  } else if (currentSelected.length < count) {
    const available = shapeNames.filter(s => !currentSelected.includes(s));
    selectedShapes = [...currentSelected, ...available.slice(0, count - currentSelected.length)];
  }
  
  updateButtons();
  startMorphing();
}

function toggleShape(shape, btn) {
  const idx = selectedShapes.indexOf(shape);
  
  if (idx > -1) {
    if (selectedShapes.length > targetCount) {
      selectedShapes.splice(idx, 1);
      btn.classList.remove('selected');
    }
  } else {
    if (selectedShapes.length < targetCount) {
      selectedShapes.push(shape);
      btn.classList.add('selected');
    }
  }
  
  updateButtons();
  startMorphing();
}

function updateButtons() {
  document.querySelectorAll('.shape-btn').forEach((btn, i) => {
    const shape = shapeNames[i];
    btn.classList.toggle('selected', selectedShapes.includes(shape));
  });
  
  if (selectedShapes.length >= 2) {
    currentIndex = 0;
    shapeEl.className = 'shape ' + selectedShapes[0];
    statusEl.textContent = `${shapeLabels[shapeNames.indexOf(selectedShapes[0])]} → ${shapeLabels[shapeNames.indexOf(selectedShapes[(currentIndex + 1) % selectedShapes.length])]}...`;
  } else {
    statusEl.textContent = 'Selecciona al menos 2 formas';
  }
}

function startMorphing() {
  if (autoInterval) clearInterval(autoInterval);
  
  if (selectedShapes.length < 2) return;
  
  isPlaying = true;
  currentIndex = 0;
  shapeEl.className = 'shape ' + selectedShapes[0];
  
  autoInterval = setInterval(() => {
    currentIndex = (currentIndex + 1) % selectedShapes.length;
    shapeEl.className = 'shape ' + selectedShapes[currentIndex];
    
    const nextIdx = (currentIndex + 1) % selectedShapes.length;
    statusEl.textContent = `${shapeLabels[shapeNames.indexOf(selectedShapes[currentIndex])]} → ${shapeLabels[shapeNames.indexOf(selectedShapes[nextIdx])]}...`;
  }, 1800);
}

updateButtons();
startMorphing();
</script>
</body>
</html>
